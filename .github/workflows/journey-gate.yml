# Delegates to phenoShared reusable gate (skips when no manifests).
name: Journey Gate
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  journey-gate:
    uses: KooshaPari/phenotype-tooling/.github/workflows/reusable/journey-gate.yml@main
