name: CodeQL (Rust)
on:
  push:
    branches: [main]
    paths-ignore:
      - ".github/workflows/**"
      - "**/*.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - ".github/workflows/**"
      - "**/*.md"
  schedule:
    - cron: '17 4 * * 2'
  workflow_dispatch:



concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  analyze:
    name: Analyze (rust)
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Initialize CodeQL
        uses: github/codeql-action/init@865f5f5c36632f18690a3d569fa0a764f2da0c3e
        with:
          languages: rust
      - name: Autobuild
        uses: github/codeql-action/autobuild@865f5f5c36632f18690a3d569fa0a764f2da0c3e
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@865f5f5c36632f18690a3d569fa0a764f2da0c3e
        with:
          category: "/language:rust"
