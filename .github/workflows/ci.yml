name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-quality:
    name: Rust Quality (reusable)
    uses: KooshaPari/phenotype-infrakit/.github/workflows/reusable/rust-quality.yml@main
    with:
      rust-version: stable
      coverage-threshold: 0
      working-directory: .

  security-scan:
    name: Security Scan (reusable)
    uses: KooshaPari/phenotype-infrakit/.github/workflows/reusable/security-scan.yml@main
    with:
      cargo-audit: "true"
      cargo-deny: "false"
      trufflehog: "false"
      working-directory: .
