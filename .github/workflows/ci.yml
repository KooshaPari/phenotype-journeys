name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  rust-quality:
    name: Rust Quality (reusable)
    uses: KooshaPari/phenoShared/.github/workflows/reusable/rust-quality.yml@f5343b1d349e523df2fe44f94d8f25d2ec320c6d
    with:
      rust-version: stable
      coverage-threshold: 0
      working-directory: .

  security-scan:
    name: Security Scan (reusable)
    uses: KooshaPari/phenoShared/.github/workflows/reusable/security-scan.yml@f5343b1d349e523df2fe44f94d8f25d2ec320c6d
    with:
      cargo-audit: "true"
      cargo-deny: "false"
      trufflehog: "false"
      working-directory: .

  cliff-template-check:
    name: Check cliff.toml adoption
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Check cliff.toml template adoption
        run: ./scripts/check-cliff-template.sh
