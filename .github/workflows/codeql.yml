name: CodeQL
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 4 * * 1"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: ["javascript", "actions"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: github/codeql-action/init@865f5f5c36632f18690a3d569fa0a764f2da0c3e
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/autobuild@865f5f5c36632f18690a3d569fa0a764f2da0c3e
      - uses: github/codeql-action/analyze@865f5f5c36632f18690a3d569fa0a764f2da0c3e
        with:
          category: "/language:${{ matrix.language }}"
