name: cargo-machete

on:
  push:
    branches: [main]
    paths: ['Cargo.toml', '**/Cargo.toml']
  pull_request:
    paths: ['Cargo.toml', '**/Cargo.toml']
  schedule:
    - cron: '47 6 * * 4'  # weekly Thursday
  workflow_dispatch:

jobs:
  machete:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: bnjbvr/cargo-machete@6b17ed8200a096fda2a7e1a98940f90c9ef36d2b
