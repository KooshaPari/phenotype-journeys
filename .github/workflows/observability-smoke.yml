name: observability-smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  observability-smoke:
    name: Observability crate build + unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "phenotype-journeys-observability"
      - name: Build observability crate
        run: cargo build -p phenotype-journeys-observability
      - name: Run unit tests
        run: cargo test -p phenotype-journeys-observability --no-fail-fast
      - name: Verify binary starts (smoke)
        env:
          OTEL_EXPORTER_OTLP_ENDPOINT: http://127.0.0.1:14317
        run: |
          set -e
          cargo build --release --bin phenotype-journey
          ./target/release/phenotype-journey --help > /tmp/help.txt
          test -s /tmp/help.txt
          grep -q "phenotype-journey" /tmp/help.txt
          echo "OBSERVABILITY_SMOKE_OK"
