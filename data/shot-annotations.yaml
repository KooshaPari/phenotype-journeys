# Central annotation registry for inline <Shot> screenshots.
#
# Schema: { <journey_id>: { <frame_index>: [ { bbox, label, color?, style?, note? } ] } }
# frame_index is 1-based and matches the `frame-NNN.png` suffix.
# bbox coordinates are in the image's natural (pre-scale) pixel space.
#
# The <Shot> Vue component accepts an inline `annotations` prop; when absent,
# the doc-site build step injects entries from this file at publish time.

plan-deepseek:
  3:
    - bbox: [120, 340, 220, 28]
      label: "MLA (kv_lora_rank=512)"
      color: "#89b4fa"
      note: "Planner auto-detected Multi-head Latent Attention"
  2:
    - bbox: [80, 120, 320, 24]
      label: "Model: DeepSeek-V2"
      style: dashed

