      label: "Usage line"
      color: "#f9e2af"
  5:
    - bbox: [60, 260, 400, 20]
      label: "--attention-kind flag"

probe-list:
  2:
    - bbox: [40, 120, 480, 20]
      label: "CUDA device 0"
      color: "#cba6f7"

probe-watch:
  1:
    - bbox: [60, 80, 400, 20]
      label: "Live refresh header"

fleet-register:
  3:
    - bbox: [80, 160, 360, 24]
      label: "host entry added"
