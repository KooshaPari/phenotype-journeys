# Central annotation registry for inline <Shot> screenshots.
#
# Schema (v3 ΓÇö adds `expected_text` for OCR-assert):
#   <journey_id>:
#     <frame_index>:
#       expected_text:                         # <-- NEW in v3 (sibling of `annotations`)
#         - "one or more lowercase tokens"
#         - "that MUST appear in tesseract's OCR"
#       annotations:                           # optional; may also still be a
#                                              # bare list at the old position
#         - bbox:   [x, y, w, h]
#           label:  "..."
#           color:  "#89b4fa"
#           style:  solid | dashed
#           note:   "..."
#           kind:   region | pointer | highlight
#           position: auto
#                   | top-left | top-right
#                   | bottom-left | bottom-right
#                   | center | center-top | center-bottom
#                   | custom
#           custom: { x: 640, y: 120 }         # only when position=custom
#
# BACKWARD COMPAT: when a frame entry is a bare list (`frame_index: [ ... ]`)
# it is interpreted as the annotation list, with `expected_text: []`.
# tools/shot-linter reads `expected_text` (when present) to assert OCR.
#
# `position` controls where the Remotion JourneyRich callout bubble
# anchors for that scene. Vary across consecutive frames so callouts
# don't stack at the same corner. `auto` lets the renderer pick based on
# the bbox anchor (default top-right).
#
# frame_index is 1-based and matches the `frame-NNN.png` suffix.
# bbox coordinates are in the image's natural (pre-scale) pixel space.
#
# The <Shot> Vue component accepts an inline `annotations` prop; when absent,
# the doc-site build step injects entries from this file at publish time.

plan-deepseek:
  3:
    - bbox: [120, 340, 220, 28]
      label: "MLA (kv_lora_rank=512)"
      color: "#89b4fa"
      note: "Planner auto-detected Multi-head Latent Attention"
      position: top-right
  2:
    - bbox: [80, 120, 320, 24]
      label: "Model: DeepSeek-V2"
      style: dashed
      position: center-bottom

plan-mla-deepseek:
