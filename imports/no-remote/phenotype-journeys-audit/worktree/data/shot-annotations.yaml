# -----------------------------------------------------------------------------
# OCR expected-text index (v3).
#
# Consumed by tools/shot-linter. Per-frame arrays of tokens that MUST all
# appear (case-insensitive, substring match) in tesseract's OCR output.
# Frames not listed here fall back to caption-token matching only.
# Tokens are derived from ground-truth OCR of the baked keyframe, not from
# the caption ΓÇö this is what makes the check a real assertion rather than a
# self-referential test.
# -----------------------------------------------------------------------------

expected_text_index:
  plan-deepseek:
    1: ["hwledger", "plan"]
    2: ["hwledger", "plan", "deepseek"]
    3: ["hwledger", "plan", "deepseek", "mla"]
  plan-mla-deepseek:
    2: ["hwledger", "plan", "context"]
    3: ["context"]
    4: ["context"]
  plan-help:
    1: ["hwledger", "plan", "help"]
    5: ["attention-kind"]
    7: ["sliding-window"]
    9: ["quant"]
  probe-list:
    1: ["probe", "list"]
    2: ["cuda", "device"]
    3: ["cuda", "device", "mib"]
  probe-watch:
    1: ["probe", "watch"]
    2: ["tick", "memory"]
    3: ["tick"]
  fleet-register:
    1: ["hwledger-server"]
    3: ["fleet", "register"]
    4: ["registered", "agent", "demo-laptop"]
    7: ["fleet", "status"]
    11: ["fleet"]
  fleet-audit:
    2: ["hwledger-server"]
    3: ["fleet", "audit"]
    5: ["fleet", "audit", "agent"]
  traceability-report:
    1: ["coverage"]
    3: ["crate", "coverage"]
  first-plan:
    5: ["hwledger", "plan"]
    11: ["hwledger", "plan", "property"]
  install-cargo:
    1: ["cargo", "install"]
    3: ["cargo", "install", "hwledger"]
    4: ["hwledger", "version"]
  ingest-error:
    1: ["ingest"]
    11: ["e-ingest"]
  plan-hf-resolve:
    1: ["hf"]
    4: ["hwledger", "plan", "hf"]
