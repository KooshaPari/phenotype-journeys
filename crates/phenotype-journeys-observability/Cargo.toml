[package]
name = "phenotype-journeys-observability"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Local observability substrate for the phenotype-journeys workspace: tracing init + typed span/metric carriers. Self-contained — no external fleet dependency."

[dependencies]
# We intentionally depend on the crates.io `tracing` family directly rather
# than the archived `pheno-tracing` crate. The historical wrapper exists so
# the rest of the workspace depends on a local crate name; the implementation
# now ships in-house, which keeps `cargo install --path .` hermetic.
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "json"] }
tracing-core = "0.1"
thiserror = { workspace = true }

[lib]
path = "src/lib.rs"
